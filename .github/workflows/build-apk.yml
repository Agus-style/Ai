# File: .github/workflows/build-apk.yml
name: ⚙️ Build APK Otomatis

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Ambil Kode Project
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js (Versi 20)
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'  # ← DIUBAH JADI 20

      - name: 📦 Install Dependencies
        run: npm install

      - name: ☕ Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 🤖 Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: ⚡ Setup Expo & EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: 🔨 Build APK
        run: |
          npx expo install --fix
          # Pake --non-interactive biar gak minta input
          eas build --platform android --profile preview --local --non-interactive --output ./app-build.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_DEBUG: 1

      - name: 📤 Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-android
          path: ./app-build.apk
