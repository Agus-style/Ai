name: Build APK (Local - No EAS)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build Android Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      # ── Prebuild dulu agar folder android/ ada ────────────────────────────
      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_NO_TELEMETRY: 1

      # ── Generate keystore langsung di sini, tidak perlu secret apapun ─────
      - name: Generate keystore
        run: |
          keytool -genkey -v \
            -keystore android/app/release.keystore \
            -alias agon-key \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass password123 \
            -keypass password123 \
            -dname "CN=Agon, OU=Dev, O=Agon, L=Jakarta, ST=DKI, C=ID"

      # ── Build release APK ─────────────────────────────────────────────────
      - name: Build Release APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=app/release.keystore \
            -Pandroid.injected.signing.store.password="password123" \
            -Pandroid.injected.signing.key.alias="agon-key" \
            -Pandroid.injected.signing.key.password="password123"

      # ── Upload APK ke GitHub Artifacts ────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: agon-preview-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14

      # ── Buat GitHub Release otomatis ──────────────────────────────────────
      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Agon Preview v${{ github.run_number }}"
          files: android/app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
